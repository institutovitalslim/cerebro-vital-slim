services:
  postgres:
    image: postgres:16
    container_name: content-engine-postgres
    restart: unless-stopped
    mem_limit: 4g
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-content_engine}
      POSTGRES_USER: ${POSTGRES_USER:-content_engine}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-content_engine_dev}
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    container_name: content-engine-redis
    restart: unless-stopped
    mem_limit: 3g
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6381:6379"

  api:
    image: python:3.12-slim
    container_name: content-engine-api
    restart: unless-stopped
    mem_limit: 2g
    working_dir: /app
    env_file:
      - .env
      - /root/.openclaw/secure/meta_insights.env
      - /root/.openclaw/secure/rapidapi.env
    command: sh -c "pip install --no-cache-dir -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8010 --workers 3"
    volumes:
      - ./apps/api:/app
      - ./storage:/root/cerebro-vital-slim/sistemas/content-engine-os/storage
      - /root/cerebro-vital-slim/cerebro/assets/fotos-dra-daniely:/root/cerebro-vital-slim/cerebro/assets/fotos-dra-daniely
    ports:
      - "127.0.0.1:8010:8010"
    depends_on:
      - postgres
      - redis

  web:
    image: node:20-alpine
    container_name: content-engine-web
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env
    command: sh -c "npm install && npm run build && npx next start -H 0.0.0.0 -p 3010"
    volumes:
      - ./apps/web:/app
    ports:
      - "127.0.0.1:3010:3010"
    depends_on:
      - api

volumes:
  postgres_data:
