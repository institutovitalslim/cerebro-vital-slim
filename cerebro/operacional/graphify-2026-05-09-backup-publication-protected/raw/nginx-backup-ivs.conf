# IVS Agent OS backup endpoint reservation
# Guardrail: this vhost does not expose backup files, cockpit, logs, or credentials.
server {
    server_name backup.institutovitalslim.com.br;

    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    add_header X-Content-Type-Options "nosniff" always;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }


    location ^~ /agent-os/ {
        auth_basic "IVS Agent OS backup";
        auth_basic_user_file /etc/nginx/backup-ivs.htpasswd;
        alias /srv/ivs-agent-os-backups/agent-os/;
        autoindex off;
        default_type application/octet-stream;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    location = /__backup_alive {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location / {
        return 403;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/backup.institutovitalslim.com.br/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/backup.institutovitalslim.com.br/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = backup.institutovitalslim.com.br) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name backup.institutovitalslim.com.br;
    return 404; # managed by Certbot


}