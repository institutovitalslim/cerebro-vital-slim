<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RECOMEÇO - Instituto Vital Slim</title>
<style>
  @page { size: 7cm 7cm; margin: 0; }
  html, body {
    width: 7cm; height: 7cm; margin: 0; padding: 0;
    background: #f7f4ee;
    font-family: Arial, Helvetica, sans-serif;
  }
  .card {
    box-sizing: border-box;
    width: 7cm; height: 7cm;
    background: #f7f4ee;
    color: #6d645c;
    position: relative;
    padding: 0.52cm 0.46cm 0.46cm;
  }
  .border {
    position: absolute; inset: 0.22cm;
    border: 1.4px solid #b9afa4;
    pointer-events: none;
  }
  .content {
    position: relative;
    z-index: 2;
    text-align: center;
    line-height: 1.18;
  }
  .small {
    font-size: 10.8pt;
    font-weight: 300;
    letter-spacing: 0.02em;
  }
  .big {
    font-size: 23pt;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: #6a5d50;
    margin: 0.08cm 0 0.15cm;
  }
  .mid {
    font-size: 9.7pt;
    font-weight: 300;
    line-height: 1.22;
    margin: 0.03cm 0;
  }
  .spacer-sm { height: 0.08cm; }
  .spacer-md { height: 0.18cm; }
  .logo {
    position: absolute;
    bottom: 0.38cm;
    left: 0.46cm;
    right: 0.46cm;
    text-align: center;
    font-size: 8pt;
    color: #b3924c;
    letter-spacing: 0.18em;
    font-weight: 700;
  }
  .sublogo {
    display: block;
    font-size: 4.8pt;
    letter-spacing: 0.24em;
    color: #8c847b;
    margin-top: 0.05cm;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="border"></div>
    <div class="content">
      <div class="small">Cada fio que nasce é sinal de um</div>
      <div class="big">RECOMEÇO,</div>

      <div class="mid">continue se cuidando, você está no</div>
      <div class="mid">caminho certo. Mais importante</div>
      <div class="mid">que o crescimento dos fios, é o</div>
      <div class="mid">crescimento da sua</div>

      <div class="big">CONFIANÇA.</div>

      <div class="mid">Nunca foi sobre fazer os cabelos</div>
      <div class="mid">crescerem. Sempre foi sobre</div>

      <div class="big">AUTO ESTIMA!</div>
    </div>
    <div class="logo">VITAL SLIM<span class="sublogo">INSTITUTO</span></div>
  </div>
</body>
</html>
