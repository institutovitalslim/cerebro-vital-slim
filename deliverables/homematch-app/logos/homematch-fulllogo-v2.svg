<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" fill="#F5F0E8"/>
  
  <!-- Full logo: HM + text with reduced tracking -->
  <g transform="translate(512, 420)">
    <!-- H left stem -->
    <rect x="-130" y="-100" width="32" height="200" fill="#1A1A1A"/>
    <!-- H right stem -->
    <rect x="-30" y="-100" width="32" height="200" fill="#1A1A1A"/>
    <!-- H crossbar -->
    <rect x="-130" y="-20" width="132" height="28" fill="#1A1A1A"/>
    
    <!-- M left stem -->
    <rect x="30" y="-100" width="32" height="200" fill="#1A1A1A"/>
    <!-- M right stem -->
    <rect x="130" y="-100" width="32" height="200" fill="#1A1A1A"/>
    <!-- M center peak -->
    <polygon points="62,-100 96,40 130,-100 158,-100 96,100 34,-100" fill="#1A1A1A"/>
  </g>
  
  <!-- Elegant line -->
  <line x1="382" y1="580" x2="642" y2="580" stroke="#1A1A1A" stroke-width="2" opacity="0.5"/>
  
  <!-- Brand name with NORMAL tracking -->
  <text x="512" y="640" 
        font-family="Arial, sans-serif" 
        font-size="28" 
        font-weight="400"
        letter-spacing="2"
        fill="#1A1A1A" 
        text-anchor="middle">HOMEMATCH CLUB</text>
</svg>