<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" fill="#0A0A0A"/>
  
  <!-- Simple house shape with H -->
  <g transform="translate(512, 450)" fill="none" stroke="#C9A96E" stroke-linecap="round" stroke-linejoin="round">
    <!-- Roof -->
    <path d="M -140,-80 L 0,-200 L 140,-80" stroke-width="24"/>
    <!-- House body -->
    <path d="M -120,-80 L -120,120" stroke-width="24"/>
    <path d="M 120,-80 L 120,120" stroke-width="24"/>
    <path d="M -120,120 L 120,120" stroke-width="24"/>
    <!-- H inside house -->
    <path d="M -50,-20 L -50,80" stroke-width="20"/>
    <path d="M 50,-20 L 50,80" stroke-width="20"/>
    <path d="M -50,30 L 50,30" stroke-width="18"/>
  </g>
  
  <!-- Text -->
  <text x="512" y="720" 
        font-family="Arial, sans-serif" 
        font-size="26" 
        font-weight="300"
        letter-spacing="14"
        fill="#C9A96E" 
        text-anchor="middle">HOMEMATCH CLUB</text>
</svg>