<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Rich gold gradient -->
    <linearGradient id="richGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D5A3;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C9A96E;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#B8941F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9F8844;stop-opacity:1" />
    </linearGradient>
    
    <!-- Subtle shadow for depth -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background with subtle texture -->
  <rect width="1024" height="1024" fill="#0A0A0A"/>
  
  <!-- Golden ratio positioning: center at 512, 382 (512/1.618*2.618) -->
  <g transform="translate(512, 390)" filter="url(#softShadow)">
    
    <!-- H - Elegant serif with curved terminals -->
    <g fill="none" stroke="url(#richGold)" stroke-linecap="round" stroke-linejoin="round">
      <!-- H left stem -->
      <path d="M -185,-150 L -185,150" stroke-width="22"/>
      <!-- H right stem -->
      <path d="M -55,-150 L -55,150" stroke-width="22"/>
      <!-- H crossbar -->
      <path d="M -185,-10 L -55,-10" stroke-width="18"/>
      <!-- H top serif left -->
      <path d="M -200,-150 L -170,-150" stroke-width="22"/>
      <!-- H top serif right -->
      <path d="M -70,-150 L -40,-150" stroke-width="22"/>
      <!-- H bottom serif left -->
      <path d="M -200,150 L -170,150" stroke-width="22"/>
      <!-- H bottom serif right -->
      <path d="M -70,150 L -40,150" stroke-width="22"/>
    </g>
    
    <!-- M - Overlapping with H, elegant curves -->
    <g fill="none" stroke="url(#richGold)" stroke-linecap="round" stroke-linejoin="round" opacity="0.95">
      <!-- M left stem -->
      <path d="M 55,-150 L 55,150" stroke-width="22"/>
      <!-- M right stem -->
      <path d="M 185,-150 L 185,150" stroke-width="22"/>
      <!-- M left diagonal -->
      <path d="M 55,-150 Q 95,-20 120,80" stroke-width="20"/>
      <!-- M right diagonal -->
      <path d="M 185,-150 Q 145,-20 120,80" stroke-width="20"/>
      <!-- M top serif left -->
      <path d="M 40,-150 L 70,-150" stroke-width="22"/>
      <!-- M top serif right -->
      <path d="M 170,-150 L 200,-150" stroke-width="22"/>
      <!-- M bottom serif left -->
      <path d="M 40,150 L 70,150" stroke-width="22"/>
      <!-- M bottom serif right -->
      <path d="M 170,150 L 200,150" stroke-width="22"/>
    </g>
    
  </g>
  
  <!-- Decorative double line with golden ratio spacing -->
  <g transform="translate(512, 600)" filter="url(#glow)">
    <!-- Main line -->
    <line x1="-220" y1="0" x2="220" y2="0" stroke="url(#richGold)" stroke-width="3.5" opacity="0.95"/>
    <!-- Secondary line (golden ratio spacing: 3.5*1.618≈5.6) -->
    <line x1="-200" y1="18" x2="200" y2="18" stroke="#C9A96E" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- Brand name with refined tracking -->
  <text x="512" y="685" 
        font-family="'Times New Roman', 'Georgia', serif" 
        font-size="36" 
        font-weight="400"
        font-style="italic"
        letter-spacing="14"
        fill="url(#richGold)" 
        text-anchor="middle"
        opacity="0.95">HOMEMATCH CLUB</text>
  
  <!-- Est. with refined spacing -->
  <text x="512" y="740" 
        font-family="'Times New Roman', serif" 
        font-size="19" 
        font-style="italic"
        letter-spacing="8"
        fill="#9F8844" 
        text-anchor="middle"
        opacity="0.5">Est. 2026</text>
  
</svg>