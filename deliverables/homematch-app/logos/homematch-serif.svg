<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" fill="#F5F0E8"/>
  
  <!-- Monogram HM with real serif font -->
  <text x="512" y="560" 
        font-family="'Times New Roman', Georgia, serif" 
        font-size="380" 
        font-weight="400"
        fill="#1A1A1A" 
        text-anchor="middle">HM</text>
  
  <!-- Elegant line -->
  <line x1="362" y1="620" x2="662" y2="620" stroke="#1A1A1A" stroke-width="2" opacity="0.6"/>
  
  <!-- Brand name -->
  <text x="512" y="700" 
        font-family="'Times New Roman', serif" 
        font-size="32" 
        font-weight="300"
